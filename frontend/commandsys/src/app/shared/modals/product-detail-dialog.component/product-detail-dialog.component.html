<div *ngIf="loading()" class="p-8 text-center text-slate-500">
  Cargando detalle del producto...
</div>

<div *ngIf="!loading() && product()" class="max-w-md mx-auto p-4">
  <!-- Encabezado -->
  <div class="flex justify-between items-center mb-3">
    <h2 class="text-xl font-semibold text-slate-800">{{ product().name }}</h2>
    <button (click)="close()" class="text-slate-400 hover:text-slate-600">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <p class="text-slate-600 text-sm mb-4">
    {{ product().description || 'Sin descripción disponible' }}
  </p>

  <!-- Opciones -->
  <div *ngFor="let opt of product().options" class="mb-4">
    <h4 class="text-sky-700 font-semibold mb-2">
      {{ opt.name }}
      <span *ngIf="opt.is_required" class="text-red-500">*</span>
    </h4>

    <!-- Radios o checkboxes -->
    <div
      *ngFor="let val of opt.values"
      (click)="toggleValue(opt, val)"
      class="cursor-pointer flex items-center justify-between border border-slate-200 rounded-xl px-3 py-2 mb-2 hover:bg-sky-50"
      [class.bg-sky-100]="isSelected(opt.id_option, val.id_value)"
    >
      <div>
        <span class="text-slate-800 text-sm">{{ val.name }}</span>
        <span *ngIf="val.extra_price > 0" class="text-xs text-slate-500 ml-1">
          (+{{ val.extra_price | currency:'MXN':'symbol':'1.0-0' }})
        </span>
      </div>
      <mat-icon *ngIf="isSelected(opt.id_option, val.id_value)" class="text-sky-600">check</mat-icon>
    </div>
  </div>

  <!-- Cantidad -->
  <div class="flex justify-between items-center border-t border-slate-200 pt-3 mt-4">
    <div class="flex items-center gap-2">
      <button (click)="decreaseQty()" class="w-8 h-8 rounded-full bg-slate-200 hover:bg-slate-300">
        <mat-icon>remove</mat-icon>
      </button>
      <span class="text-lg font-semibold text-slate-800">{{ quantity() }}</span>
      <button (click)="increaseQty()" class="w-8 h-8 rounded-full bg-slate-200 hover:bg-slate-300">
        <mat-icon>add</mat-icon>
      </button>
    </div>

    <!-- Botón Agregar (habilitado solo si isAdding es true) -->
    <button
      *ngIf="isAdding"
      [disabled]="!isAdding"
      class="bg-gradient-to-r from-sky-500 to-indigo-600 text-white font-medium px-5 py-2 rounded-xl hover:opacity-90 transition-all"
      (click)="addToOrder()"
    >
      Agregar
    </button>

    <!-- Mensaje si estamos en modo consulta -->
    <button
      *ngIf="!isAdding"
      class="bg-slate-300 text-slate-700 px-5 py-2 rounded-xl"
      disabled
    >
      Solo consulta
    </button>
  </div>
</div>
