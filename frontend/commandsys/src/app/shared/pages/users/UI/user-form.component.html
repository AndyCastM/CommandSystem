<!-- Contenedor del formulario dentro del modal -->
<div
  class="flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden
         w-full sm:w-[380px] md:w-[520px] lg:w-[560px] max-w-[92vw]
         max-h-[85dvh]"
>
  <!-- Encabezado -->
  <div
    class="p-5 border-b border-slate-200 bg-gradient-to-r from-sky-50 via-white to-sky-50"
  >
    <h2
      class="text-2xl font-bold text-slate-800 flex items-center gap-2"
    >
      <mat-icon class="text-sky-600">person_add</mat-icon>
      {{ title() }}
    </h2>
    <p class="text-slate-500 text-sm mt-1">
      {{ subtitle() }}
    </p>
  </div>

  <!-- Contenido (scroll interno) -->
  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="flex-1 overflow-y-auto p-6 space-y-5 custom-scroll"
  >
    <!-- Sucursal -->
    <div class="space-y-1.5" *ngIf="shouldShowBranch(data.currentUser)">
      <label class="text-sm font-semibold text-slate-700">Sucursal</label>
      <mat-select
        formControlName="id_branch"
        class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
        [panelClass]="'filter-panel'"
      >
        <mat-option [value]="null" disabled>Selecciona una sucursal</mat-option>
        <mat-option *ngFor="let b of branches()" [value]="b.id_branch">
          {{ b.name }}
        </mat-option>
      </mat-select>
    </div>

    <!-- Rol -->
    <div class="space-y-1.5">
      <label class="text-sm font-semibold text-slate-700">Rol</label>
      <mat-select
        formControlName="id_role"
        class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
        [panelClass]="'filter-panel'"
      >
        <mat-option [value]="null" disabled>Selecciona un rol</mat-option>
        <mat-option *ngFor="let r of roles()" [value]="r.id_role">
            {{ r.name }}
        </mat-option>
            
      </mat-select>
    </div>

    <!-- Nombre -->
    <div class="space-y-1.5">
      <label class="text-sm font-semibold text-slate-700">Nombre</label>
      <input
        type="text"
        formControlName="name"
        placeholder="Ej: Juan"
        class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
      />
    </div>

    <!-- Apellidos -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700">Primer apellido</label>
        <input
          type="text"
          formControlName="last_name"
          placeholder="Ej: Pérez"
          class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
        />
      </div>
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700">Segundo apellido (opcional)</label>
        <input
          type="text"
          formControlName="last_name2"
          placeholder="Ej: Ramírez"
          class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
        />
      </div>
    </div>

    <!-- Usuario -->
    <div class="space-y-1.5">
      <label class="text-sm font-semibold text-slate-700">Nombre de usuario</label>
      <input
        type="text"
        formControlName="username"
        placeholder="Ej: juan.perez"
        class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
      />
    </div>

    <!-- Contraseña -->
    <div class="space-y-1.5" *ngIf="!editing()">
      <label class="text-sm font-semibold text-slate-700">Contraseña</label>
      <input
        type="password"
        formControlName="password"
        placeholder="Mínimo 6 caracteres"
        class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
      />
    </div>
  </form>

  <!-- Footer -->
  <div
    class="p-4 border-t bg-white flex flex-col sm:flex-row justify-end gap-3 sticky bottom-0"
  >
    <button
      type="button"
      class="w-full sm:w-auto px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50 transition-all"
      (click)="close()"
      [disabled]="saving()"
    >
      Cancelar
    </button>
    <button
      type="submit"
      form="userForm"
      class="w-full sm:w-auto px-4 py-2 rounded-xl text-white bg-gradient-to-r from-[#3aa3bd] to-[#283996] hover:opacity-90 transition-all flex items-center justify-center gap-2"
      (click)="submit()"
      [disabled]="form.invalid"
    >
      <mat-icon *ngIf="saving()" class="animate-spin !text-base">autorenew</mat-icon>
      {{ saving() ? 'Guardando...' : (editing() ? 'Actualizar' : 'Crear') }}
    </button>
  </div>
</div>
