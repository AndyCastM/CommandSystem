<div class="p-6 w-full max-w-md">

  <!-- Título -->
  <h2 class="text-2xl font-semibold text-slate-800 mb-4">
    Pago de la orden #{{ orderId }}
  </h2>

  <!-- Total -->
  <div class="bg-indigo-600 text-white rounded-xl p-4 shadow-md mb-6">
    <div class="text-sm opacity-80">Total a pagar</div>
    <div class="text-3xl font-bold">${{ total | number:'1.2-2' }}</div>
  </div>

  <!-- Método de pago -->
  <div class="mb-5">
    <label class="block text-sm font-medium text-slate-700 mb-2">Método de pago</label>

    <div class="grid grid-cols-3 gap-3">

      <button
        (click)="method.set('cash')"
        [class.bg-indigo-600]="method() === 'cash'"
        [class.text-white]="method() === 'cash'"
        class="border border-slate-300 rounded-lg py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white transition">
        Efectivo
      </button>

      <button
        (click)="method.set('card')"
        [class.bg-indigo-600]="method() === 'card'"
        [class.text-white]="method() === 'card'"
        class="border border-slate-300 rounded-lg py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white transition">
        Tarjeta
      </button>

      <button
        (click)="method.set('transfer')"
        [class.bg-indigo-600]="method() === 'transfer'"
        [class.text-white]="method() === 'transfer'"
        class="border border-slate-300 rounded-lg py-2 text-sm font-medium hover:bg-indigo-500 hover:text-white transition">
        Transferencia
      </button>

    </div>
  </div>

  <!-- Campos específicos -->
  <div class="space-y-4">

    <!-- MONTO RECIBIDO -->
    <div *ngIf="method() === 'cash'">
      <label class="block text-sm font-medium text-slate-700 mb-1">Monto recibido</label>
      <input
        type="number"
        min="0"
        [ngModel]="amountPaid()"
        (ngModelChange)="amountPaid.set($event)"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        placeholder="0.00" />

      <!-- Cambio -->
      <div class="mt-2 text-slate-700" *ngIf="change() > 0">
        <span class="font-medium">Cambio:</span>
        <span class="text-green-600 font-semibold">${{ change() | number:'1.2-2' }}</span>
      </div>
    </div>

    <!-- PROPINA -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">
        Propina (opcional)
      </label>
      <input
        type="number"
        min="0"
        [ngModel]="tip()"
        (ngModelChange)="tip.set($event)"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        placeholder="0.00" />
    </div>

  </div>

  <!-- Botones -->
  <div class="mt-8 flex justify-end gap-3">

    <button
      (click)="cancel()"
      class="px-4 py-2 rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-100 transition text-sm font-medium">
      Cancelar
    </button>

    <button
      (click)="confirm()"
      class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium shadow hover:bg-indigo-700 active:scale-[0.98] transition flex items-center gap-2">
      <span class="material-icons text-base">check_circle</span>
      Confirmar Pago
    </button>

  </div>

</div>
