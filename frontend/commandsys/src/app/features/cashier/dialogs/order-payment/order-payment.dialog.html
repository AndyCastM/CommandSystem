<div class="p-6 w-full max-w-md">

  <!-- Título -->
  <h2 class="text-2xl font-semibold text-slate-800 mb-4">
    <!-- Si viene mesa/sesión, úsala; si no, usa id de orden -->
    <ng-container *ngIf="table; else ordenTitle">
      Pago de mesa {{ table }}
    </ng-container>
    <ng-template #ordenTitle>
      Pago de la orden #{{ orderId }}
    </ng-template>
  </h2>

  <!-- Total -->
  <div class="bg-indigo-600 text-white rounded-xl p-4 shadow-md mb-6">
    <div class="text-sm opacity-80">Total a pagar</div>
    <div class="text-3xl font-bold">
      ${{ total | number:'1.2-2' }}
    </div>
  </div>

  <!-- Montos por método -->
  <div class="space-y-4">

    <!-- EFECTIVO -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">
        Pago en efectivo
      </label>
      <input
        type="number"
        min="0"
        step="1"
        (input)="validateAmounts()"
        [ngModel]="cashAmount()"
        (ngModelChange)="cashAmount.set(($event) || 0)"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        placeholder="0.00" />
    </div>

    <!-- TARJETA -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">
        Pago con tarjeta
      </label>
      <input
        type="number"
        min="0"
        step="1"
        (input)="validateAmounts()"
        [ngModel]="cardAmount()"
        (ngModelChange)="cardAmount.set(($event) || 0)"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        placeholder="0.00" />
    </div>

    <!-- TRANSFERENCIA -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">
        Pago por transferencia
      </label>
      <input
        type="number"
        min="0"
        step="1"
        (input)="validateAmounts()"
        [ngModel]="transferAmount()"
        (ngModelChange)="transferAmount.set(($event) || 0)"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        placeholder="0.00" />
    </div>

    <!-- RESUMEN -->
    <div class="mt-4 text-sm text-slate-700 space-y-1">
      <p>
        <span class="font-medium">Total pagado:</span>
        ${{ totalPaid() | number:'1.2-2' }}
      </p>

      <p *ngIf="remaining() > 0">
        <span class="font-medium">Restante:</span>
        ${{ remaining() | number:'1.2-2' }}
      </p>

      <p *ngIf="change() > 0">
        <span class="font-medium">Cambio:</span>
        <span class="text-green-600 font-semibold">
          ${{ change() | number:'1.2-2' }}
        </span>
      </p>
    </div>

  </div>

  <!-- Botones -->
  <div class="mt-8 flex justify-end gap-3">

    <button
      (click)="cancel()"
      class="px-4 py-2 rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-100 transition text-sm font-medium">
      Cancelar
    </button>

    <button
      (click)="confirm()"
      class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium shadow hover:bg-indigo-700 active:scale-[0.98] transition flex items-center gap-2">
      <span class="material-icons text-base">check_circle</span>
      Confirmar Pago
    </button>

  </div>

</div>
