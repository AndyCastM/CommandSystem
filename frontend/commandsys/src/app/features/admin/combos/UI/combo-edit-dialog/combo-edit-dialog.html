<div class="w-full max-w-[850px] mx-auto max-h-[85vh] overflow-y-auto bg-white rounded-2xl p-6">
  <h2 class="text-xl font-semibold text-slate-800 mb-4 flex items-center gap-2">
    <mat-icon class="text-sky-600">edit</mat-icon>
    Editar Combo
  </h2>

  <form [formGroup]="form" class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div>
        <label class="text-sm font-medium text-slate-700">Nombre</label>
        <input
          formControlName="name"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
        />
      </div>
      <div>
        <label class="text-sm font-medium text-slate-700">Precio base</label>
        <input
          type="number"
          formControlName="base_price"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
        />
      </div>
    </div>

    <div>
      <label class="text-sm font-medium text-slate-700">Descripción</label>
      <textarea
        rows="2"
        formControlName="description"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
      ></textarea>
    </div>

    <!-- Productos -->
    <div class="border-t pt-3">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-sm font-semibold text-slate-700">Productos del combo</h3>
        <button type="button" (click)="addItem()" class="text-sky-600 text-sm hover:underline">
          + Agregar producto
        </button>
      </div>
      <div formArrayName="items" class="space-y-2">
        <div
          *ngFor="let item of items.controls; let i = index"
          [formGroupName]="i"
          class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-200"
        >
          <select
            formControlName="id_company_product"
            class="flex-1 border border-slate-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-sky-200"
          >
            <option *ngFor="let p of products" [value]="p.id_company_product">
              {{ p.name }}
            </option>
          </select>
          <input
            type="number"
            formControlName="quantity"
            class="w-20 border border-slate-300 rounded-lg px-2 py-2 text-sm text-center focus:ring-2 focus:ring-sky-200"
          />
          <button type="button" (click)="removeItem(i)" class="text-rose-500 hover:text-rose-600">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Grupos -->
    <div class="border-t pt-3">
      <div class="flex justify-between items-center mb-2">
        <h3 class="text-sm font-semibold text-slate-700">Grupos configurables</h3>
        <button type="button" (click)="addGroup()" class="text-sky-600 text-sm hover:underline">
          + Agregar grupo
        </button>
      </div>

      <div formArrayName="groups" class="space-y-3">
        <div
          *ngFor="let group of groups.controls; let g = index"
          [formGroupName]="g"
          class="border rounded-lg p-3 bg-slate-50 shadow-sm"
        >
          <div class="flex justify-between items-center mb-2">
            <h4 class="font-semibold text-slate-700">Grupo {{ g + 1 }}</h4>
            <button type="button" (click)="removeGroup(g)" class="text-rose-500 hover:text-rose-600">
              <mat-icon>delete</mat-icon>
            </button>
          </div>

          <div class="grid grid-cols-2 gap-2 mb-2">
            <input
              type="text"
              formControlName="label"
              placeholder="Ej. Bebidas"
              class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
            />
            <input
              type="number"
              formControlName="max_selection"
              placeholder="Máx. seleccionables"
              class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
            />
          </div>

          <div class="flex items-center gap-2 mb-2">
            <label class="text-sm text-slate-600">Obligatorio</label>
            <input type="checkbox" formControlName="is_required" />
          </div>

          <div formArrayName="options" class="space-y-2 border-t pt-2">
            <div
              *ngFor="let opt of getOptions(g).controls; let o = index"
              [formGroupName]="o"
              class="flex items-center gap-2 bg-white p-2 rounded-lg border border-slate-200"
            >
              <select
                formControlName="id_company_product"
                class="flex-1 border border-slate-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-sky-200"
              >
                <option *ngFor="let p of products" [value]="p.id_company_product">
                  {{ p.name }}
                </option>
              </select>
              <input
                type="number"
                formControlName="extra_price"
                class="w-20 border border-slate-300 rounded-lg px-2 py-2 text-sm text-center focus:ring-2 focus:ring-sky-200"
                placeholder="+$"
              />
              <button
                type="button"
                (click)="removeOption(g, o)"
                class="text-rose-500 hover:text-rose-600"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </div>
            <button
              type="button"
              (click)="addOption(g)"
              class="text-sky-600 text-sm hover:underline ml-auto block"
            >
              + Agregar opción
            </button>
          </div>
        </div>
      </div>
    </div>
  </form>

  <div class="mt-5 flex justify-end gap-3">
    <button
      class="px-4 py-2 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100 transition"
      (click)="dialogRef.close(false)"
    >
      Cancelar
    </button>
    <button
      color="primary"
      class="px-5 py-2 rounded-xl text-white bg-gradient-to-r from-[#16a3bd] to-[#283996] hover:opacity-90 flex items-center justify-center gap-2 disabled:opacity-60"
      (click)="save()"
    >
      Guardar cambios
    </button>
  </div>
</div>
