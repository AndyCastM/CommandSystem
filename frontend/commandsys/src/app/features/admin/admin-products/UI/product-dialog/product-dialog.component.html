<div
  class="flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden max-h-[85dvh] relative transition-all duration-500"
  [ngClass]="{
    'w-full sm:w-[450px] md:w-[650px] lg:w-[700px] max-w-[92vw]': !form.controls.is_customizable.value,
    'w-full md:w-[1600px] lg:w-[1800px] max-w-[98vw] grid md:grid-cols-2': form.controls.is_customizable.value
  }"
>
  <button 
    *ngIf="form.controls.is_customizable.value"
    type="button"
    (click)="collapsed = !collapsed"
    class="absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 z-50 w-8 h-12 bg-slate-800 text-white rounded-full shadow-xl flex items-center justify-center hover:bg-sky-600 transition-all hidden md:flex"
    [style.left]="collapsed ? '0%' : '50%'"
  >
    <mat-icon class="transition-transform duration-500" [style.transform]="collapsed ? 'rotate(180deg)' : 'rotate(0deg)'">
      chevron_left
    </mat-icon>
  </button>

  <form (ngSubmit)="submit()"
        class="space-y-4 overflow-y-auto p-4 transition-all duration-500"
        [style.maxHeight]="'90vh'"
        [class.hidden]="collapsed && form.controls.is_customizable.value">

    <div
      class="p-4 border-b border-slate-200 bg-gradient-to-r from-sky-50 via-white to-sky-50"
    >
      <h2
        class="text-2xl font-bold text-slate-800 flex items-center gap-2"
      >
      <span class="material-symbols-outlined text-sky-600">
        cake_add
      </span>      
      {{ title() }}
      </h2>
      <p class="text-slate-500 text-sm mt-1"> {{ subtitle() }} </p>
    </div>

    <div class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-slate-700">Categoría</label>
          <div class="rounded-xl border border-slate-300 bg-white px-3">
            <mat-select
              [formControl]="form.controls.id_category"
              class="w-full text-sm text-slate-800"
              [panelClass]="'filter-panel'"
            >
              <mat-option [value]="null" disabled>Selecciona</mat-option>
              <mat-option *ngFor="let c of categories()" [value]="c.id_category">
                {{ c.name }}
              </mat-option>
            </mat-select>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-sm font-medium text-slate-700">Área</label>
          <div class="rounded-xl border border-slate-300 bg-white px-3">
            <mat-select 
              [formControl]="form.controls.id_area"
              class="w-full text-sm text-slate-800"
              [panelClass]="'filter-panel'"
            >
              <mat-option [value]="null" disabled>Selecciona</mat-option>
              <mat-option *ngFor="let a of areas()" [value]="a.id_area">
                {{ a.name }}
              </mat-option>
            </mat-select>
          </div>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-slate-700">Nombre</label>
        <input type="text"
               class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2.5 text-sm text-slate-800 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
               [formControl]="form.controls.name" />
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-slate-700">Precio base</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">$</span>
          <input type="number" step="0.01" min="0"
                 class="w-full bg-white rounded-xl border border-slate-300 pl-8 px-3 py-2.5 text-sm text-slate-800 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
                 [formControl]="form.controls.base_price" />
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-slate-700">Tiempo de preparación (min)</label>
        <input type="number" min="0"
               class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2.5 text-sm text-slate-800 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
               [formControl]="form.controls.preparation_time" />
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-slate-700">Descripción</label>
        <textarea rows="3"
                  class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2.5 text-sm text-slate-800 outline-none focus:ring-2 focus:ring-sky-200 focus:border-sky-300"
                  [formControl]="form.controls.description"></textarea>
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium text-slate-700">Imagen del producto</label>

        <div class="relative w-full">
          <input
            id="image-upload"
            type="file"
            accept="image/*"
            hidden
            (change)="onFileSelected($event)"
          />

          <div
            *ngIf="imagePreview(); else uploadBox"
            class="relative group rounded-xl border border-slate-300 overflow-hidden w-full h-52 flex items-center justify-center bg-slate-100"
          >
            <img
              [src]="imagePreview()!"
              alt="preview"
              class="object-cover w-full h-full"
            />

            <div
              class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
            >
              <button
                type="button"
                class="px-4 py-2 bg-white/90 text-rose-600 font-medium rounded-lg hover:bg-white"
                (click)="clearImage()"
              >
                Quitar imagen
              </button>
            </div>
          </div>

          <ng-template #uploadBox>
            <button
              type="button"
              (click)="triggerFilePick()"
              class="w-full h-52 flex flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-300 bg-slate-50 hover:border-sky-400 hover:bg-sky-50 transition-all"
            >
              <span
                class="material-symbols-outlined text-5xl text-slate-400 group-hover:text-sky-500 mb-1"
              >
                add_photo_alternate
              </span>
              <span class="text-sm text-slate-600 font-medium">
                Subir imagen
              </span>
              <span class="text-xs text-slate-400 mt-1">(JPG, PNG o WEBP)</span>
            </button>
          </ng-template>
        </div>
      </div>


      <div class="flex items-center gap-2 border-t border-slate-200 pt-3 mt-4">
        <input type="checkbox" [formControl]="form.controls.is_customizable" id="customizable" />
        <label for="customizable" class="text-sm font-medium text-slate-700 cursor-pointer select-none">
          Producto personalizable
        </label>
      </div>
    </div>

    <div
      class="p-6 border-t bg-white flex flex-col sm:flex-row justify-end gap-3 sticky bottom-0"
    >
        <button
          type="button"
          class="w-full sm:w-auto px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50 transition-all"
          (click)="close()"
          [disabled]="saving()"
        >
          Cancelar
        </button>
        <button
          type="submit"
          form="userForm"
          (click)="submit()"
          class="w-full sm:w-auto px-4 py-2 rounded-xl text-white bg-gradient-to-r from-[#3aa3bd] to-[#283996] hover:opacity-90 transition-all flex items-center justify-center gap-2"
          [disabled]="form.invalid"
        >
          <mat-icon *ngIf="saving()" class="animate-spin !text-base">autorenew</mat-icon>
          {{ saving() ? 'Guardando...' : (editing() ? 'Actualizar' : 'Crear') }}
        </button>
    </div>
  </form>

  <div *ngIf="form.controls.is_customizable.value"
       class="flex flex-col h-full border-l p-4 bg-slate-50 overflow-y-auto transition-all duration-500"
       [class.col-span-2]="collapsed">
    
    <div class="flex items-center gap-2 mb-2">
        <button *ngIf="collapsed" (click)="collapsed = false" class="p-1 hover:bg-slate-200 rounded-md md:hidden">
            <mat-icon>menu_open</mat-icon>
        </button>
        <h3 class="text-sm font-semibold text-slate-700">Opciones de personalización</h3>
    </div>

    <app-customization-form
      [options]="options"
      (addOption)="addOption()"
      (removeOption)="removeOption($event)"
      (addValue)="addValue($event)"
      (removeValue)="removeValue($event)"
      (addTier)="addTier($event)"
      (removeTier)="removeTier($event)">
    </app-customization-form>
  </div>
</div>
