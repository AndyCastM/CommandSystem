<div
  class="flex flex-col bg-white rounded-2xl shadow-xl
         w-full max-w-[90vw] sm:max-w-[400px] md:max-w-[460px]
         lg:max-w-[500px] max-h-[85dvh] border border-slate-100
         animate-fade-in mx-auto overflow-y-auto"
>
  <!-- Header -->
  <div class="p-4 border-b border-slate-200 bg-gradient-to-r from-sky-50 via-white to-sky-50">
    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
      <mat-icon class="text-sky-600">add_circle</mat-icon>
      Nueva Área
    </h2>
    <p class="text-xs text-slate-500 mt-1">
      Crea un área como cocina, bar o postres.
    </p>
  </div>

  <!-- Formulario -->
  <form [formGroup]="form" class="p-4 space-y-4 flex-1 overflow-y-auto">
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">
        Nombre del área
      </label>
      <input
        type="text"
        formControlName="name"
        placeholder="Ej. Cocina Fría"
        class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800
               focus:ring-2 focus:ring-sky-200 focus:border-sky-300 transition-all"
      />
    </div>

    <!-- Botones -->
    <div class="flex justify-end gap-2 pt-3 border-t border-slate-100 mt-4">
      <button
        mat-dialog-close
        type="button"
        class="w-full sm:w-auto px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50 transition-all"
      >
        Cancelar
      </button>

      <button
        type="button"
        (click)="save()"
        [disabled]="form.invalid"
        class="w-full sm:w-auto px-4 py-2 rounded-xl text-white bg-gradient-to-r from-[#3aa3bd] to-[#283996] hover:opacity-90 transition-all flex items-center justify-center gap-2"
      >
        Guardar área
      </button>
    </div>
  </form>
</div>
