<div
  class="flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden
         w-full sm:w-[380px] md:w-[520px] lg:w-[560px] max-w-[92vw]"
>
  <div class="p-5 border-b border-slate-200 bg-gradient-to-r from-sky-50 via-white to-sky-50">
    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
      <mat-icon class="text-sky-600">business</mat-icon>
      Editar empresa
    </h2>
    <p class="text-slate-500 text-sm mt-1">Actualiza datos o estado de la empresa</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="flex-1 p-6 space-y-5">
    <div>
      <label class="text-sm font-semibold text-slate-700">Nombre comercial</label>
      <input
        type="text"
        formControlName="name"
        class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
      />
    </div>

    <div>
      <label class="text-sm font-semibold text-slate-700">Razón social</label>
      <input
        type="text"
        formControlName="legal_name"
        class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
      />
    </div>

    <div>
      <label class="text-sm font-semibold text-slate-700">Teléfono</label>
      <input
        type="text"
        formControlName="phone"
        class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
      />
    </div>

    <div>
      <label class="text-sm font-semibold text-slate-700">Correo electrónico</label>
      <input
        type="email"
        formControlName="email"
        class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-sky-200"
      />
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" formControlName="is_active" id="active" />
      <label for="active" class="text-sm text-slate-700">Empresa activa</label>
    </div>

    <div class="flex justify-end gap-3 pt-4 border-t border-slate-200">
      <button
        type="button"
        class="px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50"
        (click)="close()"
      >
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="form.invalid || saving()"
        class="px-4 py-2 rounded-xl text-white bg-gradient-to-r from-sky-500 to-sky-600 hover:opacity-90 transition"
      >
        Guardar cambios
      </button>
    </div>
  </form>
</div>
