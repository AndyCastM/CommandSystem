<div
  class="flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden
         w-full sm:w-[420px] md:w-[640px] max-w-[92vw] max-h-[85dvh]"
>
  <div class="p-5 border-b border-slate-200 bg-gradient-to-r from-sky-50 via-white to-sky-50">
    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
      <mat-icon class="text-sky-600">people</mat-icon>
      Usuarios de {{ company.name }}
    </h2>
    <p class="text-slate-500 text-sm mt-1">Soporte técnico de accesos</p>
  </div>

  <div class="flex-1 overflow-y-auto p-4 space-y-3">
    <div *ngIf="loading()">Cargando usuarios...</div>

    <div
      *ngFor="let u of users()"
      class="border border-slate-200 rounded-xl p-3 flex flex-col sm:flex-row sm:items-center sm:justify-between"
    >
      <div>
        <p class="text-sm font-medium text-slate-800">{{ u.name }} {{ u.last_name }}</p>
        <p class="text-sm text-slate-500">{{ u.username }} — {{ u.role }}</p>
      </div>
      <div class="flex gap-2 mt-2 sm:mt-0">
        <button
          class="text-sky-600 text-sm flex items-center gap-1 hover:underline"
          (click)="resetPassword(u)"
        >
          <mat-icon class="text-sm">lock_reset</mat-icon>
          Reset
        </button>
        <button
          class="text-rose-600 text-sm flex items-center gap-1 hover:underline"
          (click)="toggleActive(u)"
        >
          <mat-icon class="text-sm">{{ u.is_active ? 'block' : 'check_circle' }}</mat-icon>
          {{ u.is_active ? 'Desactivar' : 'Activar' }}
        </button>
      </div>
    </div>
  </div>

  <div class="p-4 border-t bg-white flex justify-end">
    <button
      type="button"
      class="px-4 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-50 transition-all"
      (click)="close()"
    >
      Cerrar
    </button>
  </div>
</div>
