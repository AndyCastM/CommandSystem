<div
  class="flex flex-col bg-white rounded-2xl shadow-lg overflow-hidden
         w-full max-w-[95vw] sm:max-w-lg md:max-w-2xl lg:max-w-3xl
         max-h-[90dvh]"
>
  <!-- ENCABEZADO -->
  <div
    class="p-4 sm:p-5 border-b border-slate-200 
           bg-gradient-to-r from-sky-50 via-white to-sky-50"
  >
    <h2
      class="text-xl sm:text-2xl font-bold text-slate-800 flex items-center flex-wrap gap-2"
    >
      <mat-icon class="text-sky-600">people</mat-icon>
      <span class="truncate">Usuarios de {{ company.name }}</span>
    </h2>
    <p class="text-slate-500 text-xs sm:text-sm mt-1">
      Soporte técnico de accesos
    </p>
  </div>

  <!-- CONTENIDO -->
  <div
    class="flex-1 overflow-y-auto p-3 sm:p-4 space-y-3 
           scrollbar-thin scrollbar-thumb-slate-300 scrollbar-track-transparent"
  >
    <div *ngIf="loading()" class="text-center text-slate-500 py-6">
      <mat-icon class="animate-spin text-sky-500 align-middle">sync</mat-icon>
      <span class="ml-2">Cargando usuarios...</span>
    </div>

    <div
      *ngFor="let u of users()"
      class="border border-slate-200 rounded-xl p-3 sm:p-4 
             flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between
             hover:bg-slate-50 transition-all"
    >
      <!-- INFORMACIÓN DE USUARIO -->
      <div class="flex flex-col gap-1 min-w-0">
        <p class="text-sm sm:text-base font-semibold text-slate-800 truncate">
          {{ u.name }} {{ u.last_name }}
        </p>
        <p class="text-xs sm:text-sm text-slate-500 truncate">
          {{ u.username }} — {{ u.role_name }}
        </p>
        <span
          class="inline-flex items-center gap-1 text-xs sm:text-sm font-medium mt-1"
          [ngClass]="u.is_active ? 'text-green-700' : 'text-rose-700'"
        >
          <mat-icon
            class="!text-base"
            [ngClass]="u.is_active ? 'text-green-600' : 'text-rose-600'"
          >
            {{ u.is_active ? 'check_circle' : 'block' }}
          </mat-icon>
          {{ u.is_active ? 'Activo' : 'Inactivo' }}
        </span>
      </div>

      <!-- ACCIONES -->
      <div
        class="flex flex-wrap gap-2 sm:gap-3 mt-2 sm:mt-0 justify-start sm:justify-end w-full sm:w-auto"
      >
        <!-- Botón RESET visible solo si está activo -->
        <button
          *ngIf="u.is_active"
          title="Reset Contraseña"
          class="text-sky-600 text-xs sm:text-sm flex items-center gap-1 hover:underline"
          (click)="resetPassword(u)"
        >
          <mat-icon class="text-sm sm:text-base">lock_reset</mat-icon>
          Reset
        </button>

        <!-- Botón ACTIVAR / DESACTIVAR -->
        <button
          title="Desactivar/Activar usuario"
          class="text-xs sm:text-sm flex items-center gap-1 hover:underline"
          [ngClass]="u.is_active ? 'text-rose-600' : 'text-green-600'"
          (click)="toggleActive(u)"
        >
          <mat-icon class="text-sm sm:text-base">
            {{ u.is_active ? 'block' : 'check_circle' }}
          </mat-icon>
          {{ u.is_active ? 'Desactivar' : 'Activar' }}
        </button>
      </div>
    </div>
  </div>

  <!-- PIE -->
  <div
    class="p-3 sm:p-4 border-t bg-white flex flex-col sm:flex-row justify-end items-center gap-2"
  >
    <button
      type="button"
      class="w-full sm:w-auto px-4 py-2 rounded-xl border border-slate-300 
             text-slate-700 hover:bg-slate-50 text-sm sm:text-base transition-all"
      (click)="close()"
    >
      Cerrar
    </button>
  </div>

    <app-reset-password-modal
      *ngIf="showResetModal()"
      [user]="selectedUser()"
      [close]="closeResetModal.bind(this)"
      [onConfirm]="handleResetPassword.bind(this)"
    />

</div>
