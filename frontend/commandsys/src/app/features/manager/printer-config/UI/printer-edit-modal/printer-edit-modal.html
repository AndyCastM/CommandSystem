<!-- BACKDROP -->
<div
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50"
  (click)="close()">

  <!-- CARD -->
  <div
    class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6"
    (click)="$event.stopPropagation()">

    <h2 class="text-xl font-bold text-slate-800 mb-5">
      Editar impresora
    </h2>

    <!-- Nombre -->
    <label class="block text-sm font-medium text-slate-700 mb-1">
      Nombre
    </label>

    <input
      type="text"
      class="border border-slate-300 rounded-xl px-4 py-2 w-full mb-4 focus:ring-2 focus:ring-blue-500"
      [(ngModel)]="displayName"
    />

    <!-- Áreas -->
    <label class="block text-sm font-medium text-slate-700 mb-2">
      Áreas asignadas
    </label>

    <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 max-h-48 overflow-auto space-y-2">

      <label
        *ngFor="let a of areas"
        class="flex items-center gap-3 cursor-pointer py-2 px-3 rounded-lg hover:bg-white transition-all">

        <input
          type="checkbox"
          class="w-4 h-4 text-blue-600 rounded cursor-pointer"
          [checked]="areaIds.includes(a.id_area)"
          (change)="toggleArea(a.id_area, $event.target.checked)"
        />

        <span class="text-sm text-slate-700">
          {{ a.name }}
        </span>

      </label>

    </div>

    <!-- Acciones -->
    <div class="flex justify-end gap-3 mt-6">

      <button
        class="px-4 py-2 text-sm rounded-lg bg-slate-200 hover:bg-slate-300"
        (click)="close()">
        Cancelar
      </button>

      <button
        class="px-4 py-2 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700"
        (click)="save()">
        Guardar cambios
      </button>

    </div>

  </div>
</div>
