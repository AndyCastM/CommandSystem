<div class="sm:max-w-[500px] max-h-[90vh] overflow-y-auto p-4">
  <div class="mb-4">
    <h2 class="text-xl font-semibold">{{ title() }}</h2>
    <p class="text-slate-500 text-sm">{{ subtitle() }}</p>
  </div>

  <form (ngSubmit)="submit()" class="space-y-4">
    <!-- Categoría -->
    <div class="space-y-2">
      <label class="text-sm">Categoría</label>
      <mat-select [formControl]="form.controls.id_category" class="w-full">
        <mat-option [value]="null" disabled>Selecciona</mat-option>
        <mat-option *ngFor="let c of categories()" [value]="c.id_category">{{ c.name }}</mat-option>
      </mat-select>
      <p *ngIf="showError('id_category','required')" class="text-xs text-rose-600">Requerido</p>
    </div>

    <!-- Área -->
    <div class="space-y-2">
      <label class="text-sm">Área</label>
      <mat-select [formControl]="form.controls.id_area" class="w-full">
        <mat-option [value]="null" disabled>Selecciona</mat-option>
        <mat-option *ngFor="let a of areas()" [value]="a.id_area">{{ a.name }}</mat-option>
      </mat-select>
      <p *ngIf="showError('id_area','required')" class="text-xs text-rose-600">Requerido</p>
    </div>

    <!-- Nombre -->
    <div class="space-y-2">
      <label class="text-sm" for="name">Nombre</label>
      <input id="name" type="text"
             class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-200"
             [formControl]="form.controls.name">
      <p *ngIf="showError('name','required')" class="text-xs text-rose-600">Requerido</p>
      <p *ngIf="showError('name','onlySpaces')" class="text-xs text-rose-600">No puede ser solo espacios</p>
    </div>

    <!-- Precio base -->
    <div class="space-y-2">
      <label class="text-sm" for="base_price">Precio base</label>
      <div class="relative">
        <span class="absolute left-3 top-2.5 text-slate-400">$</span>
        <input id="base_price" type="number" step="0.01" min="0"
               class="w-full bg-white rounded-xl border border-slate-300 pl-8 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-200"
               [formControl]="form.controls.base_price">
      </div>
    </div>

    <!-- Tiempo de preparación -->
    <div class="space-y-2">
      <label class="text-sm" for="prep">Tiempo de preparación (min)</label>
      <input id="prep" type="number" min="0"
             class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-200"
             [formControl]="form.controls.preparation_time">
    </div>

    <!-- Descripción -->
    <div class="space-y-2">
      <label class="text-sm" for="description">Descripción</label>
      <textarea id="description" rows="3"
                class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-200"
                [formControl]="form.controls.description"></textarea>
    </div>

    <!-- Imagen -->
    <div class="space-y-2">
      <label class="text-sm">Imagen del Producto</label>

      <!-- URL opcional -->
      <input type="url" placeholder="https://ejemplo.com/imagen.jpg"
             class="w-full bg-white rounded-xl border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-200"
             [formControl]="form.controls.image_url" />

      <!-- Archivo -->
      <div class="flex items-center gap-2 mt-2">
        <input id="image-upload" type="file" accept="image/*" hidden (change)="onFileSelected($event)" />
        <button type="button" class="border rounded-lg px-3 py-2" (click)="triggerFilePick()">Subir archivo</button>
        <button *ngIf="imagePreview()" type="button" class="bg-rose-600 text-white rounded-lg px-3 py-2" (click)="clearImage()">Quitar</button>
      </div>

      <img *ngIf="imagePreview()" [src]="imagePreview()!" alt="preview"
           class="w-full h-48 object-cover rounded-lg border mt-2" />
    </div>

    <!-- Acciones -->
    <div class="flex justify-end gap-2 pt-4">
      <button type="button" class="border rounded-xl px-4 py-2" (click)="close()" [disabled]="saving()">Cancelar</button>
      <button type="submit" class="rounded-xl px-4 py-2 text-white bg-[#3aa3bd] hover:bg-[#283996]" [disabled]="saving() || form.invalid">
        {{ editing() ? 'Actualizar' : 'Crear' }}
      </button>
    </div>
  </form>
</div>
