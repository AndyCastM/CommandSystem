<div class="max-w-6xl mx-auto p-4">
  <!-- ENCABEZADO -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-3">
    <div>
      <div class="text-sm text-slate-500">
        Mesero / <span class="text-slate-700 font-medium">Menú</span>
      </div>
      <h1 class="text-3xl font-bold text-slate-800 mt-1">Menú del Restaurante</h1>
    </div>

    <button
      type="button"
      (click)="goBack()"
      class="bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-slate-300 flex items-center gap-1"
    >
      <mat-icon class="!text-base">arrow_back</mat-icon>
      Volver
    </button>
  </div>

  <!-- CONTENIDO -->
  <div *ngIf="loading()" class="text-slate-500 text-center mt-8">Cargando menú...</div>

  <div *ngIf="!loading() && menu().length > 0" class="space-y-6">
    <div *ngFor="let section of menu()" class="">
      <h2 class="text-base font-semibold text-sky-700 border-b border-slate-200 pb-1 mb-3">
        {{ section.category }}
      </h2>

      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
        <div
          *ngFor="let product of section.products"
          class="bg-white rounded-xl shadow-sm p-3 hover:shadow-md transition-all border border-slate-100 flex flex-col"
          (click)="openProductDetail(product.id)"
        >
          <!-- Imagen -->
          <div class="relative w-full h-28 bg-slate-100 rounded-lg overflow-hidden mb-2">
            <img
              [src]="product.image || 'https://placehold.co/300x200?text=Sin+Imagen'"
              alt="{{ product.name }}"
              class="w-full h-full object-cover object-center"
              (error)="onImageError($event)"
            />
          </div>

          <!-- Información -->
          <div class="flex-1">
            <h3 class="text-slate-800 font-semibold text-sm truncate">
              {{ product.name }}
            </h3>
            <p class="text-slate-500 text-xs line-clamp-2 mb-1">
              {{ product.description || 'Sin descripción' }}
            </p>
          </div>

          <!-- Precio y botón -->
          <div class="flex items-center justify-between mt-1">
            <span class="text-sky-700 font-semibold text-sm">
              {{ formatPrice(product.price) }}
            </span>

            <button
              class="bg-sky-500 text-white rounded-md px-2 py-1 text-xs font-medium flex items-center gap-1 hover:bg-sky-600"
            >
              <span class="material-symbols-outlined text-[14px]">add</span>
              Agregar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading() && menu().length === 0" class="text-center text-slate-500 mt-10">
    No hay productos disponibles.
  </div>
</div>
