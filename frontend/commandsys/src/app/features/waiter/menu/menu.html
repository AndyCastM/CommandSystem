<div class="max-w-5xl mx-auto p-4">
  <h1 class="text-2xl font-bold text-slate-800 mb-6">Menú del Restaurante</h1>

  <div *ngIf="loading()" class="text-slate-500">Cargando menú...</div>

  <div *ngIf="!loading()">
    <div *ngFor="let section of menu()" class="mb-8">
      <h2 class="text-lg font-semibold text-sky-700 border-b pb-1 mb-3">
        {{ section.category }}
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div
          *ngFor="let product of section.products"
          class="bg-white rounded-2xl shadow-md p-4 hover:shadow-lg transition-all border border-slate-100"
        >
          <img
            *ngIf="product.image"
            [src]="product.image"
            alt="{{ product.name }}"
            class="rounded-xl w-full h-40 object-cover mb-3"
          />
          <h3 class="text-slate-800 font-semibold text-base">
            {{ product.name }}
          </h3>
          <p class="text-slate-500 text-sm mb-2">
            {{ product.description || 'Sin descripción' }}
          </p>
          <p class="text-sky-700 font-semibold text-sm">
            {{ formatPrice(product.price) }}
          </p>

          <!-- OPCIONES DEL PRODUCTO -->
          <div *ngIf="product.options?.length" class="mt-3">
            <p class="text-xs text-slate-400 font-semibold mb-1">Opciones:</p>
            <ul class="text-xs text-slate-600 space-y-1">
              <li *ngFor="let opt of product.options">
                <span class="font-medium">{{ opt.name }}</span>:
                <span *ngFor="let val of opt.values; let last = last">
                  {{ val.name }}<span *ngIf="!last">, </span>
                </span>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
