<div class="max-w-7xl mx-auto p-6 relative">
  <div
    [ngClass]="{
      'grid grid-cols-[2fr_1fr] gap-6': isAdding,
      'grid grid-cols-1': !isAdding
    }"
  >
    <!-- IZQUIERDA: MENÚ -->
    <div>
      
      <!-- SELECTOR TIPO DE ORDEN -->
      <div class="flex items-center gap-3 mb-4">
        <label class="text-base font-medium text-slate-700">Tipo de orden:</label>

        <mat-select
          [value]="orderType"
          (change)="orderType = $any($event.target).value"
          [panelClass]="'filter-panel'"
          [disabled]="orderType === 'dine_in'" 
          class="!w-44 border border-slate-300 rounded-lg px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-400"
        >
          <!-- Si es dine_in, muestra solo esa opción -->
          <option *ngIf="orderType === 'dine_in'" value="dine_in">🍽️ Mesa</option>

          <!-- Si no es dine_in, muestra todas -->
          <ng-container *ngIf="orderType !== 'dine_in'">
            <mat-option value="takeout">🛍️ Para llevar</mat-option>
          </ng-container>
        </mat-select>
      </div>

      <!-- encabezado -->
      <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-4">
        <div>
          <div class="text-sm text-slate-500">
            Mesero / <span class="text-slate-700 font-medium">Menú</span>
          </div>
          <h1 class="text-3xl font-bold text-slate-800 mt-1">Menú del Restaurante</h1>
        </div>

        <button
          type="button"
          (click)="goBack()"
          class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-300 flex items-center gap-2"
        >
          <mat-icon class="!text-base">arrow_back</mat-icon>
          Volver
        </button>
      </div>

      <!-- ÁREAS -->
      <div
        *ngIf="!loading() && menu() && menu().length > 0"
        class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 mb-8"
      >
        <div
          *ngFor="let section of menu()"
          (click)="selectArea(section)"
          class="bg-white border border-slate-200 rounded-xl p-4 text-center shadow-sm hover:shadow-md transition cursor-pointer"
          [class.bg-sky-50]="selectedArea?.area === section.area"
        >
          <div
            class="w-10 h-10 bg-sky-500 text-white rounded-full flex items-center justify-center mx-auto mb-3"
          >
            <mat-icon>restaurant</mat-icon>
          </div>
          <h3 class="font-semibold text-slate-800 text-sm">{{ section.area }}</h3>
          <p class="text-xs text-slate-500 mt-1">
            {{ section.categories.length }} categorías
          </p>
        </div>
      </div>

      <!-- PRODUCTOS -->
      <div *ngIf="selectedArea" class="space-y-8">
        <div *ngFor="let category of selectedArea.categories">
          <h3 class="text-lg font-semibold text-sky-700 mb-3">{{ category.category }}</h3>
          <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
            <div
              *ngFor="let product of category.products"
              (click)="openProductDetail(product.id_branch_product)"
              class="bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:shadow-md cursor-pointer transition"
            >
              <img
                [src]="product.image || 'https://placehold.co/400x300?text=Sin+Imagen'"
                class="w-full h-28 object-cover rounded-lg mb-2"
                alt="{{ product.name }}"
                (error)="onImageError($event)"
              />
              <h4 class="font-medium text-slate-800 text-sm truncate">{{ product.name }}</h4>
              <p class="text-xs text-slate-500 truncate">
                {{ product.description || 'Sin descripción' }}
              </p>
              <div class="flex justify-between items-center mt-2">
                <span class="text-sky-600 font-semibold text-sm">
                  {{ formatPrice(product.price) }}
                </span>
                <mat-icon class="text-slate-400 text-sm">add_circle</mat-icon>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DERECHA: COMANDA -->
    <div *ngIf="isAdding" class="hidden md:block">
      <app-order-preview
        [cart]="cart"
        [totalAmount]="totalAmount"
        [updateQuantity]="updateQuantity"
        [removeFromCart]="removeFromCart"
        [confirmOrder]="confirmOrder"
        [isAdding]="isAdding"
      ></app-order-preview>
    </div>

  </div>

  <!-- DRAWER MÓVIL -->
  <div *ngIf="isAdding" class="block md:hidden">
    <button
      (click)="drawerOpen = !drawerOpen"
      class="fixed bottom-4 right-4 bg-sky-500 text-white rounded-full shadow-lg w-14 h-14 flex items-center justify-center"
    >
      <mat-icon>{{ drawerOpen ? 'close' : 'shopping_cart' }}</mat-icon>
    </button>

    <div
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 rounded-t-2xl shadow-xl transition-transform duration-300"
      [ngClass]="{ 'translate-y-0': drawerOpen, 'translate-y-full': !drawerOpen }"
    >
      <div class="p-4">
        <h2 class="text-lg font-semibold text-slate-800 mb-3">🧾 Comanda</h2>

        <app-order-preview
          [cart]="cart"
          [totalAmount]="totalAmount"
          [updateQuantity]="updateQuantity"
          [removeFromCart]="removeFromCart"
          [confirmOrder]="confirmOrder"
          [isAdding]="isAdding"
        ></app-order-preview>
      </div>
    </div>
  </div>
</div>
