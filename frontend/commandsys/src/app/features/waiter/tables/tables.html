<div class="max-w-6xl mx-auto px-4 md:px-0">
  <!-- Encabezado -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-3">
    <div>
      <div class="text-sm text-slate-500">
        Mesero /
        <span class="text-slate-700 font-medium">Mesas</span>
      </div>
      <h1 class="text-3xl font-bold text-slate-800 mt-1 tracking-tight">
        Gestión de Mesas
      </h1>
      <p class="text-sm text-slate-500 mt-1">
        Administra mesas, toma comandas y monitorea su estado en tiempo real
      </p>
    </div>
  </div>

  <!-- Filtros -->
  <div
    class="flex flex-wrap gap-3 mb-8 bg-white border border-slate-200 rounded-xl p-4 shadow-sm items-center"
  >
    <div class="flex items-center gap-2">
      <mat-icon fontIcon="filter_alt" class="text-slate-400"></mat-icon>
      <span class="text-slate-600 font-medium text-sm">Filtros</span>
    </div>

    <div class="flex flex-wrap gap-3 flex-1 items-center">
      <!-- Filtro de Estado -->
      <div class="relative">
        <mat-select
          class="!w-44 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-400 bg-white hover:border-emerald-400 transition"
          (selectionChange)="filterByStatus($event)"
          [panelClass]="'filter-panel'"
          placeholder="Estado"
        >
          <mat-option value="">Todos los estados</mat-option>
          <mat-option value="Disponible">Disponible</mat-option>
          <mat-option value="Abierta">Abierta</mat-option>
          <mat-option value="Ocupada">Ocupada</mat-option>
        </mat-select>
      </div>

      <!-- Filtro Ubicación -->
      <div class="relative">
        <mat-select
          class="!w-48 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-400 bg-white hover:border-emerald-400 transition"
          (selectionChange)="filterByLocation($event)"
          [panelClass]="'filter-panel'"
          placeholder="Ubicación"
        >
          <mat-option value="">Todas las ubicaciones</mat-option>
          <mat-option *ngFor="let l of locations()" [value]="l.name">
            {{ l.name }}
          </mat-option>
        </mat-select>
      </div>
    </div>
  </div>

  <!-- Grid de mesas -->
  <div
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
  >
    <div
      *ngFor="let table of filteredTables()"
      class="rounded-2xl shadow-md border p-5 bg-white hover:shadow-lg hover:-translate-y-1 transition-all duration-200 cursor-pointer"
      [ngClass]="{
        'border-green-200 bg-green-50/60': table.status === 'Disponible',
        'border-yellow-200 bg-yellow-50/60': table.status === 'Abierta' && isMyTable(table),
        'border-yellow-100 bg-yellow-50/20': table.status === 'Abierta' && !isMyTable(table),
        'border-red-200 bg-red-50/60': table.status === 'Ocupada' && isMyTable(table),
        'border-red-100 bg-red-50/20': table.status === 'Ocupada' && !isMyTable(table)
      }"
    >
      <div class="flex justify-between items-center mb-3">
        <h3 class="font-semibold text-slate-800 text-lg">
          Mesa {{ table.name }}
        </h3>
        <span
          class="text-xs font-medium px-2.5 py-1 rounded-full"
          [ngClass]="{
            'bg-green-100 text-green-700': table.status === 'Disponible',
            'bg-yellow-100 text-yellow-700': table.status === 'Abierta',
            'bg-red-100 text-red-700': table.status === 'Ocupada'
          }"
        >
          {{ table.status }}
        </span>
      </div>

      <div class="flex items-center gap-2 text-sm text-slate-600 mb-1">
        <mat-icon class="text-slate-400" fontIcon="group"></mat-icon>
        {{ table.seats }} asientos
      </div>
      <div class="flex items-center gap-2 text-sm text-slate-600 mb-3">
        <mat-icon class="text-slate-400" fontIcon="place"></mat-icon>
        {{ table.location }}
      </div>

      <div *ngIf="table.time" class="text-xs text-yellow-700 mb-2 flex items-center gap-1">
        <mat-icon fontIcon="timer" class="text-yellow-600 text-sm"></mat-icon>
        {{ table.time }}
      </div>

      <!-- Botones -->
      <div class="flex flex-wrap gap-2">

        <!-- MESA DISPONIBLE -->
        <button
          *ngIf="table.status === 'Disponible'"
          (click)="openTable(table)"
          class="flex-1 bg-emerald-100 text-emerald-700 border border-emerald-300 rounded-lg py-1.5 text-sm font-medium hover:bg-emerald-200 transition"
        >
          + Abrir Mesa
        </button>

        <!-- MESA ABIERTA -->
        <button
          *ngIf="table.status === 'Abierta' && isMyTable(table)"
          (click)="takeOrder(table)"
          class="flex-1 bg-yellow-400 text-yellow-900 rounded-lg py-1.5 text-sm font-medium hover:bg-yellow-500 transition"
        >
          + Tomar Comanda
        </button>

        <button
          *ngIf="table.status === 'Abierta' && !isMyTable(table)"
          disabled
          class="flex-1 bg-yellow-200 text-yellow-400 rounded-lg py-1.5 text-sm font-medium cursor-not-allowed"
        >
          Mesa abierta por otro mesero
        </button>

        <!-- MESA OCUPADA -->
        <div *ngIf="table.status === 'Ocupada'" class="flex flex-col w-full gap-2">
          <button
            *ngIf="table.status === 'Ocupada'"
            (click)="requestPrebill(table)"
            class="w-full bg-white border border-slate-300 text-slate-800 rounded-lg py-1.5 text-sm font-medium hover:bg-slate-100 transition"
          >
            Solicitar pre-cuenta
          </button>

          <div class="flex gap-2">

            <!-- AGREGAR (solo dueño) -->
            <button
              *ngIf="isMyTable(table)"
              (click)="retakeOrder(table)"
              class="flex-1 bg-red-500 text-white rounded-lg py-1.5 text-sm font-medium hover:bg-red-600 transition"
            >
              + Agregar
            </button>

            <button
              *ngIf="!isMyTable(table)"
              disabled
              class="flex-1 bg-red-200 text-red-400 rounded-lg py-1.5 text-sm font-medium cursor-not-allowed"
            >
              Mesa de otro mesero
            </button>

            <!-- LIBERAR (solo dueño) -->
            <button
              *ngIf="isMyTable(table)"
              (click)="releaseTable(table)"
              class="flex-1 bg-red-700 text-white rounded-lg py-1.5 text-sm font-medium hover:bg-red-800 transition"
            >
              Liberar
            </button>

            <button
              *ngIf="!isMyTable(table)"
              disabled
              class="flex-1 bg-red-300 text-red-400 rounded-lg py-1.5 text-sm font-medium cursor-not-allowed"
            >
              No disponible
            </button>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
