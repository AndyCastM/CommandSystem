<div class="min-h-screen bg-slate-100 text-slate-800 flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-[#1f3b6f] text-white flex flex-col">
    <div class="px-4 py-5 border-b border-white/10 flex items-center gap-3">
      <div class="h-10 w-10 rounded-full bg-white/10 grid place-items-center font-bold">A</div>
      <div>
        <div class="text-sm opacity-80">Administrador</div>
        <div class="text-xs opacity-70 -mt-1">Admin</div>
      </div>
    </div>

    <nav class="flex-1 py-3 bg-white">
      <ng-container *ngFor="let item of nav">
        <a *ngIf="item.disabled"
           [routerLink]="item.path"
           routerLinkActive="bg-white/10"
           [class.opacity-50]="item.disabled"
           class="flex items-center gap-3 px-4 py-2.5 hover:bg-white/10 transition"
           [attr.aria-disabled]="item.disabled || null"
           (click)="$event.preventDefault();">
          <span>{{item.icon}}</span>
          <span class="text-gray-900">{{item.label}}</span>
        </a>
        <a *ngIf="!item.disabled"
           [routerLink]="item.path"
           routerLinkActive="bg-white/10"
           class="flex items-center gap-3 px-4 py-2.5 hover:bg-white/10 transition">
          <span>{{item.icon}}</span>
          <span class="text-gray-900">{{item.label}}</span>
        </a>
      </ng-container>
    </nav>

    <div class="px-4 py-4 border-t border-white/10">
      <a class="text-red-300 hover:text-red-200 text-sm flex items-center gap-2" href="#">
        <span>⎋</span> Cerrar sesión
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1">
    <!-- Topbar / Breadcrumb -->
    <div class="px-6 py-4 bg-white border-b border-slate-200">
      <div class="text-sm text-slate-500">Admin / <span class="text-slate-700">Configuración</span></div>
      <h1 class="text-2xl font-semibold text-slate-800">Configuración General</h1>
    </div>

    <!-- Content (superposición de páginas) -->
    <div class="p-6">
      <router-outlet />
    </div>
  </main>
</div>
