<!-- Topbar (móvil) -->
<header class="md:hidden flex items-center justify-between px-4 py-3 bg-white shadow">
  <button (click)="toggleSidebar()" aria-label="Abrir menú" class="material-icons">menu</button>
  <img src="assets/logo.png" alt="Logo" class="h-8 w-8 object-contain" />
</header>

<!-- Overlay móvil -->
<div *ngIf="sidebarOpen" (click)="closeSidebar()" class="fixed inset-0 bg-black/30 z-30 md:hidden"></div>

<!-- Layout en grid  -->
<div class="min-h-screen grid grid-cols-1 md:grid-cols-[16rem_1fr] bg-slate-100">

  <!-- Sidebar -->
  <aside
    class="fixed md:static z-40 md:z-auto inset-y-0 left-0 w-64 md:w-auto transform transition-transform duration-200 md:translate-x-0
           md:flex md:flex-col bg-white border-r border-slate-200"
    [class.-translate-x-full]="!sidebarOpen">

    <!-- Header azul del sidebar -->
    <div class="px-4 py-6 border-b border-white/10  bg-[#1f3b6f] text-white flex items-center gap-3">
      <img src="assets/logo.png" alt="Logo" class="h-9 w-9 rounded-md object-contain bg-white/10 p-1" />
      <div>
        <div class="text-sm/5 opacity-95">Administrador</div>
        <div class="text-[11px] opacity-80 -mt-0.5">Admin</div>
      </div>
    </div>

    <!-- Navegación (blanco) -->
    <nav class="flex-1 py-3 overflow-y-auto">
      <ng-container *ngFor="let item of nav">
        <a
          [routerLink]="item.path"
          [routerLinkActiveOptions]="{ exact: false }"
          routerLinkActive="bg-blue-100 text-blue-800 ring-1 ring-blue-200"
          class="group flex items-center gap-3 mx-2 my-1 px-3 py-2 rounded-md transition
                 hover:bg-blue-50 hover:text-blue-700 text-black">
          <span class="h-5 w-1 rounded-full mr-1 bg-transparent group-[.router-link-active]:bg-blue-600"></span>
          <mat-icon class="text-blue-700 group-hover:text-blue-800 group-[.router-link-active]:text-blue-700">
            {{ item.icon }}
          </mat-icon>
          <span class="group-hover:text-blue-600 group-[.router-link-active]:text-blue-800">
            {{ item.label }}
          </span>
          <span class="ml-auto opacity-0 group-hover:opacity-100 transition material-icons text-blue-600">
            chevron_right
          </span>
        </a>
      </ng-container>
    </nav>

    <!-- Footer -->
    <div class="px-4 py-4 border-t border-slate-200">
      <button (click)="onLogout()" class="text-red-600 hover:text-red-700 text-sm flex items-center gap-2">
        <span class="material-icons">logout</span> Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="bg-white">
    <div class="p-6">
      <router-outlet />
    </div>
  </main>
</div>
