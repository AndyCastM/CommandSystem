<div class="min-h-screen bg-white">
  <header class="max-w-6xl mx-auto px-6 py-6 flex items-center gap-3">
    <img [src]="logoSrc" (error)="onLogoError()" alt="CommandSystem" class="w-10 h-10 rounded-full ring-1 ring-sky-200" />
    <span class="text-xl md:text-2xl font-bold text-gray-900">CommandSystem</span>
  </header>

  <main class="max-w-6xl mx-auto px-6 pb-12 grid grid-cols-1 md:grid-cols-2 gap-10">
    <section class="order-2 md:order-1">
      <div class="p-2">
        <img [src]="illustrationSrc" (error)="onIllusError()" alt="Ilustración mesero"
          class="w-[110%] max-w-none h-auto object-contain" />
      </div>
    </section>

    <section class="order-1 md:order-2">
      <div class="text-center">
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-2">Bienvenido de nuevo</h1>
        <p class="text-gray-500 mb-6">
          Optimiza las operaciones de tu restaurante <br class="hidden md:block" />
          con nuestro sistema integral de comandas
        </p>
      </div>

      <div class="rounded-2xl border border-sky-200 bg-white shadow-xl p-8">
        <h2 class="text-xl font-bold text-gray-900 text-center">Iniciar Sesión</h2>
        <p class="text-center text-gray-500 mt-1 mb-6">Ingresa tu usuario y contraseña</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
            <input type="text" formControlName="usuario" placeholder="Ingrese el usuario"
              class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-sky-300" />
            <div class="text-red-500 text-sm mt-1" *ngIf="form.controls.usuario.touched && form.controls.usuario.invalid">
              Usuario requerido
            </div>
          </div>

          <!-- Campo de contraseña con ojito -->
          <div class="relative">
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input [type]="showPassword ? 'text' : 'password'" formControlName="contrasena" placeholder="Ingrese la contraseña"
              class="w-full px-4 py-2.5 pr-10 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-sky-300" />
            
            <!-- Icono del ojito -->
            <button type="button"
              (click)="togglePasswordVisibility()"
              tabindex="-1"
              class="absolute right-3 top-9 text-gray-400 hover:text-sky-600 transition">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>

            <div class="text-red-500 text-sm mt-1" *ngIf="form.controls.contrasena.touched && form.controls.contrasena.invalid">
              Contraseña requerida (mín. 6 caracteres)
            </div>
          </div>

          <button type="submit"
            [disabled]="loading()"
            class="w-full py-2.5 rounded-xl font-semibold text-white shadow-md bg-gradient-to-b from-sky-400 to-sky-500 hover:opacity-95 transition disabled:opacity-60">
            <span *ngIf="!loading()">Iniciar Sesión</span>
            <span *ngIf="loading()">Entrando...</span>
          </button>
        </form>
      </div>
    </section>
  </main>
</div>
